<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>личный плеер</title>
    <style>
        :root {
            --primary: #ffffff;
            --secondary: #a0a0b0;
            --bg-glass: rgba(15, 15, 20, 0.4);
            --border-glass: rgba(255, 255, 255, 0.05);
            --accent: #54a9db;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #050507;
            color: var(--secondary);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; flex-direction: column;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        body {
            animation: ambientSpace 80s infinite alternate ease-in-out;
        }

        @keyframes ambientSpace {
            0% { background: radial-gradient(circle at top left, #150d15 0%, #030305 100%); }
            50% { background: radial-gradient(circle at center, #0d1515 0%, #050307 100%); }
            100% { background: radial-gradient(circle at bottom right, #051015 0%, #030707 100%); }
        }

        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .main-content {
            display: flex;
            flex: 1;
            gap: 40px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .now-playing-view {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            padding: 40px;
            text-align: center;
        }

        .cover-art-placeholder {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #195875 0%, #0c2838 50%, #02070a 100%);
            box-shadow: 0 0 40px rgba(84, 169, 219, 0.15);
            margin-bottom: 40px;
            animation: breatheOrb 16s infinite ease-in-out alternate;
        }

        @keyframes breatheOrb {
            0% { transform: scale(0.95); filter: brightness(0.8); }
            100% { transform: scale(1.05); filter: brightness(1.2); }
        }

        .track-title {
            font-size: 24px;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .track-artist {
            font-size: 14px;
            letter-spacing: 4px;
        }

        .playlist-view {
            flex: 1;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            backdrop-filter: blur(15px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .playlist-header {
            padding: 20px 30px;
            border-bottom: 1px solid var(--border-glass);
            font-size: 12px;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        .playlist-items {
            flex: 1;
            overflow-y: auto;
            padding: 10px 0;
            scrollbar-width: thin;
            scrollbar-color: var(--secondary) transparent;
        }

        .playlist-items::-webkit-scrollbar { width: 6px; }
        .playlist-items::-webkit-scrollbar-thumb { background-color: rgba(255,255,255,0.1); border-radius: 10px; }

        .track-item {
            display: flex;
            align-items: center;
            padding: 15px 30px;
            cursor: pointer;
            transition: background 0.3s, color 0.3s;
        }

        .track-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--primary);
        }

        .track-item.active {
            color: var(--primary);
            background: rgba(84, 169, 219, 0.1);
            border-left: 3px solid var(--accent);
        }

        .track-index { width: 30px; font-size: 12px; opacity: 0.5; }
        .track-name { flex: 1; letter-spacing: 1px; }

        .player-bar {
            height: 90px;
            background: var(--bg-glass);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            backdrop-filter: blur(20px);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 20px;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn {
            background: none; border: none;
            color: var(--secondary);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.3s, transform 0.1s, text-shadow 0.3s;
            display: flex; justify-content: center; align-items: center;
        }

        .btn:hover { color: var(--primary); text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        .btn:active { transform: scale(0.9); }
        .btn-play { font-size: 32px; color: var(--primary); }

        .progress-container {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 12px;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
        }

        .progress-bar:hover .progress-fill { background: var(--accent); }
        .progress-bar:hover .progress-thumb { opacity: 1; }

        .progress-fill {
            height: 100%;
            background: var(--secondary);
            border-radius: 2px;
            width: 0%;
            transition: background 0.3s;
        }

        .progress-thumb {
            width: 10px; height: 10px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            left: 0%;
            transform: translateX(-50%);
            opacity: 0;
            transition: opacity 0.2s;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 150px;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%; background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 12px; width: 12px; border-radius: 50%;
            background: var(--secondary);
            margin-top: -4px; cursor: pointer;
            transition: background 0.3s;
        }
        input[type=range]:hover::-webkit-slider-thumb { background: var(--primary); }

        @media (max-width: 800px) {
            .main-content { flex-direction: column; }
            .cover-art-placeholder { width: 150px; height: 150px; margin-bottom: 20px; }
            .now-playing-view { padding: 20px; }
            .volume-container { display: none; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="main-content">
            <div class="now-playing-view">
                <div class="cover-art-placeholder"></div>
                <div class="track-title" id="currentTitle">Выбери трек</div>
                <div class="track-artist" id="currentArtist">Убежище</div>
            </div>

            <div class="playlist-view">
                <div class="playlist-header">Твоя библиотека</div>
                <div class="playlist-items" id="playlist">
                    </div>
            </div>
        </div>

        <div class="player-bar">
            <div class="controls">
                <button class="btn" id="prevBtn" title="Предыдущий">⏮</button>
                <button class="btn btn-play" id="playBtn" title="Играть/Пауза">▶</button>
                <button class="btn" id="nextBtn" title="Следующий">⏭</button>
            </div>

            <div class="progress-container">
                <span id="currentTime">0:00</span>
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <span id="totalTime">0:00</span>
            </div>

            <div class="volume-container">
                <span style="font-size: 18px;">🔊</span>
                <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
            </div>
        </div>
    </div>

    <script>
        const tracks = [
            { title: "Спокойствие", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music.mp3" },
            { title: "Погружение", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music1.mp3" },
            { title: "Течение времени", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music2.mp3" },
            { title: "Глубина", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music3.mp3" },
            { title: "Отдых", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music4.mp3" },
            { title: "Рассвет", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music5.mp3" },
            { title: "Мягкий свет", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music6.mp3" },
            { title: "Тишина", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music7.mp3" },
            { title: "Ночной бриз", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music8.mp3" },
            { title: "Одинокий маяк", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music9.mp3" },
            { title: "Звездная пыль", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music10.mp3" },
            { title: "Безмятежность", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music11.mp3" },
            { title: "Шепот леса", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music12.mp3" },
            { title: "Дыхание океана", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music13.mp3" },
            { title: "Теплый дождь", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music14.mp3" },
            { title: "За горизонтом", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music15.mp3" },
            { title: "Умиротворение", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music16.mp3" },
            { title: "Эхо", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music17.mp3" },
            { title: "Осенний лист", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music18.mp3" },
            { title: "Пустота", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music19.mp3" },
            { title: "Иллюзия", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music20.mp3" },
            { title: "Сон", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music21.mp3" },
            { title: "Медленное течение", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music22.mp3" },
            { title: "Тени на стене", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music23.mp3" },
            { title: "Северное сияние", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music24.mp3" },
            { title: "Падение снега", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music25.mp3" },
            { title: "Утренний туман", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music26.mp3" },
            { title: "Воздух", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music27.mp3" },
            { title: "Забвение", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music28.mp3" },
            { title: "Капли росы", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music29.mp3" },
            { title: "Растворение", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music30.mp3" },
            { title: "Созерцание", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music31.mp3" },
            { title: "Лунная дорожка", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music32.mp3" },
            { title: "Тепло костра", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music33.mp3" },
            { title: "Невесомость", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music34.mp3" },
            { title: "Путь домой", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music35.mp3" },
            { title: "Светлячки", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music36.mp3" },
            { title: "Спокойные воды", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music37.mp3" },
            { title: "Танец пылинок", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music38.mp3" },
            { title: "Осколки снов", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music39.mp3" },
            { title: "Голос ветра", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music40.mp3" },
            { title: "Бесконечность", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music41.mp3" },
            { title: "Мерцание", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music42.mp3" },
            { title: "Пробуждение", artist: "Exmoril", src: "https://cdn.jsdelivr.net/gh/Exmoril-Neocities/Exmoril_Neocities@main/music/music43.mp3" }
        ];

        let currentIndex = 0;
        let isPlaying = false;
        const audio = new Audio();
        audio.volume = 0.5;

        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const currentTitle = document.getElementById('currentTitle');
        const currentArtist = document.getElementById('currentArtist');
        const playlistEl = document.getElementById('playlist');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const progressThumb = document.getElementById('progressThumb');
        const currentTimeEl = document.getElementById('currentTime');
        const totalTimeEl = document.getElementById('totalTime');
        const volumeSlider = document.getElementById('volumeSlider');

        function renderPlaylist() {
            playlistEl.innerHTML = '';
            tracks.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = `track-item ${index === currentIndex ? 'active' : ''}`;
                div.innerHTML = `
                    <span class="track-index">${index + 1}</span>
                    <span class="track-name">${track.title}</span>
                `;
                div.addEventListener('click', () => loadTrack(index, true));
                playlistEl.appendChild(div);
            });
        }

        function loadTrack(index, autoPlay = false) {
            currentIndex = index;
            const track = tracks[currentIndex];
            audio.src = track.src;
            currentTitle.textContent = track.title;
            currentArtist.textContent = track.artist;
            
            renderPlaylist();

            if (autoPlay) {
                audio.play();
                isPlaying = true;
                playBtn.textContent = '⏸';
            }
        }

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function togglePlay() {
            if (!audio.src) loadTrack(0);
            
            if (isPlaying) {
                audio.pause();
                playBtn.textContent = '▶';
            } else {
                audio.play();
                playBtn.textContent = '⏸';
            }
            isPlaying = !isPlaying;
        }

        function playNext() {
            let nextIndex = currentIndex + 1;
            if (nextIndex >= tracks.length) nextIndex = 0;
            loadTrack(nextIndex, true);
        }

        function playPrev() {
            let prevIndex = currentIndex - 1;
            if (prevIndex < 0) prevIndex = tracks.length - 1;
            loadTrack(prevIndex, true);
        }

        audio.addEventListener('timeupdate', () => {
            const current = audio.currentTime;
            const duration = audio.duration;
            
            currentTimeEl.textContent = formatTime(current);
            if (duration) totalTimeEl.textContent = formatTime(duration);

            const percent = (current / duration) * 100;
            progressFill.style.width = `${percent}%`;
            progressThumb.style.left = `${percent}%`;
        });

        audio.addEventListener('ended', playNext);

        progressBar.addEventListener('click', (e) => {
            const rect = progressBar.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const percent = clickX / width;
            audio.currentTime = percent * audio.duration;
        });

        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', playNext);
        prevBtn.addEventListener('click', playPrev);

        renderPlaylist();
        loadTrack(0, false);
    </script>
</body>
</html>
